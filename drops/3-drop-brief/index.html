<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Wish Lanterns - meditative lantern-release experience">
    <title>Wish Lanterns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #title-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: white;
            pointer-events: auto;
            padding: 20px;
        }

        #title-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #title-screen p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        #start-button {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #start-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="title-screen">
                <h1>Wish Lanterns</h1>
                <p>Release your wishes into the night sky. Tap or click to light a lantern and watch it rise.</p>
                <button id="start-button">Begin Your Journey</button>
                <div id="instructions">Tap anywhere to create a wish lantern</div>
            </div>
        </div>
    </div>

    <script>
        // Game state and initialization
        window.gameState = {
            isPlaying: false,
            audioContext: null,
            lanterns: [],
            wishCount: 0,
            audioEnabled: true
        };

        // Initialize the game
        function initGame() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const titleScreen = document.getElementById('title-screen');
            const startButton = document.getElementById('start-button');

            // Set canvas size to match window
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Start button event
            startButton.addEventListener('click', function() {
                titleScreen.style.display = 'none';
                window.gameState.isPlaying = true;
                startAudio();
                gameLoop();
            });

            // Touch/mouse events for creating lanterns
            function createLantern(event) {
                if (!window.gameState.isPlaying) return;

                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                // Create a new lantern
                window.gameState.lanterns.push({
                    x: x,
                    y: y,
                    radius: Math.random() * 10 + 5,
                    speed: Math.random() * 2 + 1,
                    opacity: 1,
                    color: `hsl(${Math.random() * 60 + 20}, 100%, 70%)`,
                    hue: Math.random() * 60 + 20
                });

                window.gameState.wishCount++;
            }

            canvas.addEventListener('click', createLantern);
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                createLantern(e.touches[0]);
            });

            // Audio initialization
            function startAudio() {
                try {
                    window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    window.gameState.audioEnabled = true;
                } catch (e) {
                    console.warn('Audio not supported:', e);
                    window.gameState.audioEnabled = false;
                }
            }

            // Game loop
            function gameLoop() {
                if (!window.gameState.isPlaying) return;

                // Clear canvas
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw stars
                drawStars(ctx, canvas.width, canvas.height);

                // Update and draw lanterns
                updateLanterns(ctx);

                requestAnimationFrame(gameLoop);
            }

            // Draw stars in the background
            function drawStars(ctx, width, height) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for (let i = 0; i < 100; i++) {
                    const x = (i * 13) % width;
                    const y = (i * 7) % height;
                    const size = Math.sin(i) * 0.5 + 1.5;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Update and draw lanterns
            function updateLanterns(ctx) {
                for (let i = window.gameState.lanterns.length - 1; i >= 0; i--) {
                    const lantern = window.gameState.lanterns[i];

                    // Move lantern upward
                    lantern.y -= lantern.speed;

                    // Fade out as it rises
                    lantern.opacity -= 0.005;

                    // Update hue for color transition
                    lantern.hue = (lantern.hue + 0.2) % 360;

                    // Remove lantern if faded out
                    if (lantern.opacity <= 0) {
                        window.gameState.lanterns.splice(i, 1);
                        continue;
                    }

                    // Draw lantern
                    ctx.save();
                    ctx.globalAlpha = lantern.opacity;

                    // Create gradient for lantern
                    const gradient = ctx.createRadialGradient(
                        lantern.x, lantern.y, 0,
                        lantern.x, lantern.y, lantern.radius
                    );

                    gradient.addColorStop(0, `hsla(${lantern.hue}, 100%, 80%, 1)`);
                    gradient.addColorStop(1, `hsla(${lantern.hue}, 100%, 50%, 0.5)`);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(lantern.x, lantern.y, lantern.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Add glow effect
                    ctx.fillStyle = `hsla(${lantern.hue}, 100%, 70%, 0.2)`;
                    ctx.beginPath();
                    ctx.arc(lantern.x, lantern.y, lantern.radius * 2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            // Start the game
            resizeCanvas();
        }

        // Initialize the game when the page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
