<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Wish Lanterns — meditative lantern-release experience">
    <title>Wish Lanterns</title>
    <style>
        /* CSS Variables for semantic tokens */
        :root {
            --primary-color: #ff6b9d;
            --secondary-color: #4a90e2;
            --background-color: #0a0a1a;
            --text-color: #ffffff;
            --accent-color: #ffd166;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-size-base: 16px;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --border-radius: 8px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s ease;
        }

        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--background-color);
            color: var(--text-color);
        }

        /* Layout system */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #gameCanvas {
            background-color: var(--background-color);
            display: block;
        }

        /* UI elements */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .title-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: var(--spacing-lg);
            pointer-events: none;
        }

        .title-screen h1 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-md);
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }

        .title-screen p {
            font-size: 1.2rem;
            margin-bottom: var(--spacing-lg);
            max-width: 600px;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: 1.1rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            pointer-events: auto;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .btn:hover {
            background-color: #ff5a8d;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            position: absolute;
            bottom: var(--spacing-xl);
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .title-screen h1 {
                font-size: 2rem;
            }

            .title-screen p {
                font-size: 1rem;
            }

            .btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="ui-overlay">
                <div class="title-screen" id="titleScreen">
                    <h1>Wish Lanterns</h1>
                    <p>Release your wishes into the night sky. A meditative experience for a moment of peace.</p>
                    <button class="btn" id="startButton">Begin Journey</button>
                    <div class="instructions">Click or tap anywhere to release a lantern</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript will go here
        // This is a placeholder for the main game logic

        // Initialize the game state
        window.gameState = {
            isPlaying: false,
            lanterns: [],
            wishCount: 0,
            audioContext: null
        };

        // Set up canvas and basic game initialization
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const titleScreen = document.getElementById('titleScreen');
            const startButton = document.getElementById('startButton');

            // Set canvas dimensions to match the window
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // Initialize canvas size
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Start button event
            startButton.addEventListener('click', function() {
                titleScreen.style.display = 'none';
                window.gameState.isPlaying = true;
                // Here we would start the actual game loop
            });

            // Handle touch/click events for lantern release
            canvas.addEventListener('click', function(event) {
                if (window.gameState.isPlaying) {
                    // Handle lantern release logic
                }
            });

            canvas.addEventListener('touchstart', function(event) {
                if (window.gameState.isPlaying) {
                    event.preventDefault();
                    // Handle lantern release logic
                }
            });

            // Initialize audio context on first interaction
            function initAudio() {
                if (!window.gameState.audioContext) {
                    window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            // Initialize audio on user interaction
            document.body.addEventListener('click', initAudio, { once: true });
            document.body.addEventListener('touchstart', initAudio, { once: true });
        });
    </script>
</body>
</html>
