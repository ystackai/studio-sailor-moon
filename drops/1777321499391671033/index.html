<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sailor Moon — Ripple</title>
  <link rel="stylesheet" href="styles.css">
<style id="ystack-repair-hint-style">.ystack-repair-hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:9999;padding:6px 10px;border:1px solid rgba(255,255,255,.28);background:rgba(0,0,0,.66);color:rgba(255,255,255,.9);font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0;border-radius:4px;pointer-events:none;max-width:min(92vw,520px);text-align:center}</style>
</head>
<body>
  <div id="app" class="app-container">
    <!-- Ripple node: the central interactive element -->
    <div id="ripple-node" class="ripple-node">
      <!-- Inner glow pulse layer -->
      <div id="ripple-glow" class="ripple-glow"></div>
      <!-- Ripple ring layers (procedural, zero layout shift) -->
      <span id="ring-1" class="ripple-ring"></span>
      <span id="ring-2" class="ripple-ring"></span>
      <span id="ring-3" class="ripple-ring"></span>
      <!-- Progress ring for hold window indicator -->
      <svg id="progress-ring" class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
        <circle class="progress-track" cx="60" cy="60" r="56"/>
        <circle id="progress-arc" class="progress-arc" cx="60" cy="60" r="56"/>
      </svg>
    </div>
    <!-- Frozen breath overlay (like breath on glass) -->
    <div id="freeze-overlay" class="freeze-overlay"></div>
  </div>
  <script src="game.js"></script>
<div class="ystack-repair-hint">Click, tap, drag, or use the controls to interact.</div>
</body>
</html>
