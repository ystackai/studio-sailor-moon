<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Warm Embrace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#0a0806;font-family:'Courier New',monospace;-webkit-user-select:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

/* ── Status bar ── */
#status-bar{
  position:fixed;top:24px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;opacity:0;transition:opacity 0.6s ease;
}
#status-bar.visible{opacity:1}
#thermal-state{
  font-size:13px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,200,120,0);transition:color 0.5s ease;
  text-shadow:none;
}
#status-bar.visible #thermal-state{
  text-shadow:0 0 8px rgba(255,180,80,0.3);
}

/* ── Temperature readout ── */
#temp-readout{
  position:fixed;top:52px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;font-size:32px;font-weight:bold;letter-spacing:0.03em;
  color:rgba(255,180,80,0);transition:color 0.4s ease;
}
#temp-readout.visible{color:rgba(255,180,80,0.7)}

/* ── Lock indicator ── */
#lock-badge{
  position:fixed;top:88px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,220,150,0);opacity:0;transition:all 0.4s ease;
}
#lock-badge.locked{color:rgba(255,220,150,0.9);opacity:1}

/* ── Cozy Cloud message area ── */
#cozy-cloud{
  position:fixed;top:118px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;font-size:11px;letter-spacing:0.15em;
  color:rgba(255,230,200,0);transition:color 0.8s ease;
  max-width:280px;margin:0 auto;line-height:1.6;
}
#cozy-cloud.visible{color:rgba(255,230,200,0.55)}

/* ── Boba status (subtle) ── */
#boba-status{
  position:fixed;top:148px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(200,170,130,0);transition:color 0.6s ease;
}
#boba-status.visible{color:rgba(200,170,130,0.45)}

/* ── Bottom hint ── */
#hint{
  position:fixed;bottom:32px;left:0;right:0;text-align:center;z-index:20;
  pointer-events:none;font-size:12px;color:rgba(200,170,120,0);
  letter-spacing:0.1em;transition:opacity 1s ease;
}
#hint.show{color:rgba(200,170,120,0.5)}

/* ── Glow overlay (bloom effect) ── */
#glow-overlay{
  position:fixed;inset:0;background:radial-gradient(circle at center,rgba(255,160,40,0),transparent 70%);
  pointer-events:none;z-index:5;opacity:0;transition:opacity 0.3s ease;
}

/* ── Haptic pulse ring ── */
#pulse-ring{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  width:160px;height:160px;border-radius:50%;pointer-events:none;z-index:15;
  border:2px solid rgba(255,200,100,0.4);opacity:0;
}
#pulse-ring.pulse{animation:pulseOut 0.6s ease-out forwards}
@keyframes pulseOut{
  0%{transform:translate(-50%,-50%) scale(0.3);opacity:1}
   50%{border-color:rgba(255,230,170,0.6)}
  100%{transform:translate(-50%,-50%) scale(2.8);opacity:0;border-color:rgba(255,160,40,0)}
}

/* ── Boba cup element ── */
#boba-cup{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:18;
  pointer-events:none;opacity:0;transition:opacity 0.5s ease;
}
#boba-cup.visible{opacity:1}

/* ── Steam wisps ── */
.steam-wisp{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,230,200,0.4),transparent);
  pointer-events:none;animation:steamRise 2s ease-out forwards;
}
@keyframes steamRise{
   0%{transform:translateY(0) scale(1);opacity:0.5}
  50%{transform:translateY(-30px) translateX(var(--drift,8px)) scale(1.5);opacity:0.3}
 100%{transform:translateY(-60px) translateX(var(--drift2,15px)) scale(2);opacity:0}
}

/* ── Sip indicator (floating +1 bubble) ── */
.sip-bubble{
  position:absolute;font-size:14px;pointer-events:none;z-index:25;
  color:rgba(255,220,160,0.8);animation:sipFloat 0.8s ease-out forwards;
}
@keyframes sipFloat{
   0%{transform:translateY(0) scale(0.5);opacity:0}
  30%{transform:translateY(-10px) scale(1.2);opacity:1}
 100%{transform:translateY(-40px) scale(0.6);opacity:0}
}

/* ── Warm Embrace title glow ── */
#title-glow{
  position:fixed;top:0;left:0;right:0;height:120px;z-index:4;
  pointer-events:none;background:radial-gradient(ellipse at 50% 100%,rgba(255,180,60,0),transparent);
  transition:background 0.5s ease;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title-glow"></div>
<div id="glow-overlay"></div>
<div id="pulse-ring"></div>

<!-- Status & feedback elements -->
<div id="status-bar"><div id="thermal-state">Approaching Warmth</div></div>
<div id="temp-readout">24.0°C</div>
<div id="lock-badge">✦ Locked ✦</div>
<div id="cozy-cloud"></div>
<div id="boba-status"></div>
<div id="hint">touch to begin · bring warmth close</div>

<!-- Boba cup SVG -->
<div id="boba-cup">
  <svg width="80" height="120" viewBox="0 0 80 120">
    <!-- Cup body -->
    <defs>
      <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:rgba(60,40,20,0.8)"/>
        <stop offset="50%" style="stop-color:rgba(80,55,30,0.7)"/>
        <stop offset="100%" style="stop-color:rgba(50,35,18,0.85)"/>
      </linearGradient>
      <linearGradient id="bobaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:rgba(40,25,12,0.9)"/>
        <stop offset="100%" style="stop-color:rgba(60,40,20,0.7)"/>
      </linearGradient>
      <filter id="cupShadow">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
      </filter>
    </defs>
    <!-- Cup body with shadow -->
    <path d="M15,30 L20,110 Q20,118 28,118 L52,118 Q60,118 60,110 L65,30 Z"
          fill="url(#cupGrad)" stroke="rgba(120,90,50,0.4)" stroke-width="1"/>
    <!-- Cup rim -->
    <ellipse cx="40" cy="30" rx="27" ry="6" fill="none" stroke="rgba(120,90,50,0.5)" stroke-width="1.5"/>
    <!-- Boba pearls visible through cup -->
    <circle cx="30" cy="95" r="4" fill="rgba(40,25,12,0.7)"/>
    <circle cx="45" cy="100" r="3.5" fill="rgba(40,25,12,0.65)"/>
    <circle cx="38" cy="105" r="3" fill="rgba(40,25,12,0.7)"/>
    <circle cx="50" cy="92" r="3" fill="rgba(50,30,15,0.6)"/>
    <circle cx="28" cy="88" r="2.5" fill="rgba(40,25,12,0.6)"/>
    <!-- Warm glow inside liquid -->
    <ellipse cx="40" cy="90" rx="18" ry="22" fill="rgba(255,160,60,0.04)">
      <animate attributeName="fill" values="rgba(255,160,60,0.03);rgba(255,160,60,0.07);rgba(255,160,60,0.03)" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Straw -->
    <line x1="44" y1="30" x2="48" y2="2" stroke="rgba(180,150,100,0.5)" stroke-width="2" stroke-linecap="round"/>
  </svg>
</div>

<script>
(()=>{

// ═══════════════════════════════════════════
// WARM EMBRACE — Interactive Thermal Toy
// Hard clamp at 62°C · Synthesized ting audio
// Boba sipping mechanic · Cozy Cloud messages
// Gentle haptic feedback · Steam hiss audio
// ═══════════════════════════════════════════

const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d', { alpha: false });
const glow     = document.getElementById('glow-overlay');
const pulse    = document.getElementById('pulse-ring');
const statusBar= document.getElementById('status-bar');
const stateText= document.getElementById('thermal-state');
const tempReadout= document.getElementById('temp-readout');
const lockBadge= document.getElementById('lock-badge');
const cozyCloud= document.getElementById('cozy-cloud');
const bobaStatus= document.getElementById('boba-status');
const hintEl   = document.getElementById('hint');
const bobaCup  = document.getElementById('boba-cup');
const titleGlow= document.getElementById('title-glow');

// ── Constants & Config ───────────────────────
const TARGET_FPS    = 60;
const FRAME_DT      = 1 / TARGET_FPS;
const CLAMP_LIMIT   = 62.0;      // hard thermal barrier — never exceeded
const LOCK_THRESHOLD= 62.0;      // temperature at which lock engages
const WARM_START    = 45.0;      // below this: "approaching warmth"

// ── Cozy Cloud messages (replace all danger text) ─
const COZY_MESSAGES = {
  locked: [
    "warm embrace engaged ✦",
    "safe & steady, cozy warmth",
    "the hug is holding — relax now",
    "golden safety cocoon active",
    "thermal blanket enveloping you",
    "soft resistance, deep comfort"
  ],
  approaching: [
    "feeling the warmth grow...",
    "a gentle heat approaches...",
    "almost there, snuggling close...",
    "the warmth is finding you..."
  ],
  cooling: [
    "cool & clear ✦",
    "breezy comfort returns"
  ],
  sipping: [
    "mmm... boba bliss ☁",
    "sip sip warmth flows ~",
    "comfort in every bubble",
    "*happy slurp noises* (o◕‿‿◕)"
  ]
};

const SIP_TEXTS = ["☁ +1","~ sip ~","♡ warm","✦ cozy","(◕‿◕)☀"];

// ── State Machine ────────────────────────────
const state = {
  rawTemp:       24.0,     // starting ambient °C
  clampedTemp:   24.0,     // post-clamp output °C (never > 62)
  inputIntensity: 0,        // user-provided heat [0..1]
  locked:        false,    // thermal clamp engaged?
  approaching:   false,    // warming up but not yet locked
  lockFrame:     -1,       // frame when lock engaged (for ting timing)
  ringPulseAnim: 0,        // pulse ring animation progress
  cozyIdx:       0,        // current cozy message index
  cozyTimer:     0,        // counter for rotating messages
  hasInteracted: false,    // user has touched the screen
  sipCount:      0,        // total sips completed
  bobbaReady:    false,    // is boba cup shown?
};

// ── Boba Sipping Mechanics ───────────────────
let sipParticles = [];
let currentSipProgress = 0;    // 0..1 animation progress of a sip
let sipCooldown = 0;            // cooldown between sips in frames
const SIP_DURATION   = 40;      // frames for one complete sip animation
const SIP_COOLDOWN   = 25;      // frames to wait between sips

// ── Steam Particle System ────────────────────
let steamParticles = [];

// ═══════════════════════════════════════════
// THERMAL MODULE — Simulation + Hard Clamp
// ═══════════════════════════════════════════

// Raw thermal physics (do NOT modify this logic)
function rawThermalPhysics(dt, inputIntensity) {
  const ambientGain = inputIntensity * 18.0;    // °C/s of heating
  const passiveCool = 3.5;                       // passive dissipation °C/s
  const currentRaw  = state.rawTemp;
  const netRate     = ambientGain - passiveCool * Math.max(0, currentRaw - 24) / 96;
  return currentRaw + netRate * dt;
}

// Hard clamp — the Warm Embrace thermal protection layer
function clampThermal(rawOutput) {
  // Wrap raw sensor output: reject anything above the safe limit
  return Math.min(rawOutput, CLAMP_LIMIT);
}

// ═══════════════════════════════════════════
// AUDIO ENGINE — Synthesized Audio
// ting lock cue · steam hiss · ambient hum
// ═══════════════════════════════════════════

let audioCtx = null;
let tingTriggered  = false;      // one-shot: never repeat the lock *ting*
let alarmSilenced  = true;       // all legacy alarms silenced in Warm Embrace
let steamAudioStarted = false;   // whether steam hiss has been triggered
let steamNodes = [];             // current stream of steam audio nodes

// Initialize Web Audio Context (user-gesture gated)
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) { console.warn('Warm Embrace: Web Audio unavailable'); }
}

// ── Play the synthesized *ting* — magical choral lock cue ──
function playTing() {
  if (!audioCtx || tingTriggered) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;
  const dur = 0.100;   // 100ms total duration

  // Gentle master gain — soft volume, avoids mechanical harshness
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.25, now + 0.008);    // ~8ms attack
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  master.connect(audioCtx.destination);

  // Sine wave 1: 830 Hz — the primary choral pitch
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(830, now);

  // Sine wave 2: 870 Hz — close-pitch beat for chorally shimmering quality
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(870, now);

  // Balanced per-osc gain
  const g1 = audioCtx.createGain();
  g1.gain.value = 0.5;
  const g2 = audioCtx.createGain();
  g2.gain.value = 0.5;

  osc1.connect(g1).connect(master);
  osc2.connect(g2).connect(master);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + dur + 0.02);
  osc2.stop(now + dur + 0.02);

  tingTriggered = true;    // one-shot: never play again this session
}

// ── Silences all legacy alarm sounds ──
function silenceAllAlarms() {
  // Warm Embrace has no legacy alarms — contract anchor point
  alarmSilenced = true;
}

// ── Ambient warmth hum — low A~ drone ──
let warmHumOsc  = null;
let warmHumGain = null;

function startWarmHum() {
  if (!audioCtx || warmHumOsc) return;
  try {
    const osc   = audioCtx.createOscillator();
    osc.type      = 'sine';
    osc.frequency.value = 136;   // gentle A~
    const g       = audioCtx.createGain();
    g.gain.value      = 0.025;   // barely audible, warm background
    osc.connect(g).connect(audioCtx.destination);
    osc.start();
    warmHumOsc  = osc;
    warmHumGain = g;
  } catch(e) {}
}

function stopWarmHum() {
  if (warmHumOsc) { try { warmHumOsc.stop(); } catch(e){} }
  warmHumOsc  = null;
  warmHumGain = null;
}

// ── Steam hiss — crisp white noise layer ──
function playSteamHiss(duration) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now   = audioCtx.currentTime;
  const dur   = duration || 0.6;

  // Generate white noise buffer
  const bufferSize = Math.floor(audioCtx.sampleRate * dur);
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);

  // Low-pass filtered white noise for a soft hiss (not harsh)
  let lastOut = 0;
  const coeff = 0.96;   // low-pass filter coefficient — gentle, not sharp
  for (let i = 0; i < bufferSize; i++) {
    const white = Math.random() * 2 - 1;
    data[i] = lastOut = (lastOut + (coeff * white)) / 1.06;
    // Subtle high-pass to remove rumble
    if (i > 0) data[i] -= lastOut * 0.02;
  }

  const source   = audioCtx.createBufferSource();
  source.buffer  = noiseBuffer;

  // Tone-shaped filter for steam quality — not metallic, not mechanical
  const bandpass = audioCtx.createBiquadFilter();
  bandpass.type    = 'bandpass';
  bandpass.frequency.value = 2500;   // steam hiss lives in 1–4 kHz range
  bandpass.Q.value     = 0.5;        // wide, natural spread

  const highpass = audioCtx.createBiquadFilter();
  highpass.type    = 'highpass';
  highpass.frequency.value = 800;    // cut low rumble

  // Gain with natural fade-out
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.06, now);           // soft hiss
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

  source.connect(bandpass).connect(highpass)
      .connect(gain).connect(audioCtx.destination);

  source.start(now);
  source.stop(now + dur + 0.05);

  steamNodes.push({ source, gain });

  // Clean up completed nodes
  setTimeout(() => {
    const idx = steamNodes.findIndex(n => n.source === source);
    if (idx !== -1) steamNodes.splice(idx, 1);
  }, dur * 1000 + 50);
}

// ── Boba sip sound — gentle "slurp" tone ──
function playSipSound() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now   = audioCtx.currentTime;
  const dur   = 0.12;

  // Soft descending tone mimicking a gentle slurp
  const osc    = audioCtx.createOscillator();
  osc.type       = 'triangle';
  osc.frequency.setValueAtTime(520, now);
  osc.frequency.exponentialRampToValueAtTime(380, now + dur);

  const gain     = audioCtx.createGain();
  gain.gain.setValueAtTime(0.04, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.9);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + dur + 0.02);
}

// ═══════════════════════════════════════════
// HAPTIC ENGINE — Gentle Vibration
// Sustained low-intensity pattern during lock
// No sharp spikes — soft ripple feel only
// ═══════════════════════════════════════════

let hapticActive  = false;
let hapticInterval = null;
const VIB_PATTERN   = [80, 40, 80];   // on/off/on — gentle ripple on lock event
const LOCK_VIB      = [50, 30];       // sustained locked-state: soft buzz + tiny gap

function triggerTingHaptic() {
  if (navigator.vibrate) {
    navigator.vibrate(VIB_PATTERN);
  }
}

function startLockedHaptics() {
  if (hapticActive || !navigator.vibrate) return;
  hapticActive = true;
  // First vibration immediately
  navigator.vibrate(LOCK_VIB);
  // Repeat every 100ms to create a gentle sustained feel
  hapticInterval = setInterval(() => {
    if (!hapticActive || !state.locked) return;
    navigator.vibrate(LOCK_VIB);
  }, 90);
}

function stopLockedHaptics() {
  hapticActive = false;
  if (hapticInterval) { clearInterval(hapticInterval); hapticInterval = null; }
  if (navigator.vibrate) navigator.vibrate(0);   // cancel any queued vibration
}

// ═══════════════════════════════════════════
// BOBA SIPPING MECHANIC
// Tap-to-sip animation works under thermal lock
// ────────────────────────────────────────────

function spawnSipBubble() {
  const bubble = document.createElement('div');
  bubble.className = 'sip-bubble';
  bubble.textContent = SIP_TEXTS[Math.floor(Math.random() * SIP_TEXTS.length)];

  // Position near bobba cup top (around the straw area)
  const cupRect = bobaCup.getBoundingClientRect();
  bubble.style.left = (cupRect.left + cupRect.width / 2 - 15 + Math.random() * 30) + 'px';
  bubble.style.bottom = (window.innerHeight - cupRect.top + 10) + 'px';

  document.body.appendChild(bubble);
  setTimeout(() => bubble.remove(), 900);
}

function doSipAnimation() {
  // Only allow sipping if not on cooldown
  if (sipCooldown > 0) return;
  currentSipProgress = SIP_DURATION;    // animate for SIP_DURATION frames
  sipCooldown = SIP_COOLDOWN;           // prevent rapid-fire sips
  state.sipCount++;

  playSipSound();        // gentle slurp sound
  spawnSipBubble();      // floating text bubble (never shows danger)

  // On first sip, show the bobba cup element
  if (!state.bobbaReady) {
    state.bobbaReady = true;
    bobaCup.classList.add('visible');
  }
}

// Boba tap/click area: entire canvas is tapable for sipping when unlocked or locked
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTapStart(e.touches[0]); }, { passive: false });
canvas.addEventListener('mousedown',   (e) => { handleTapStart(e); });

function handleTapStart(touchOrMouse) {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  startWarmHum();

  state.hasInteracted = true;
  hintEl.classList.remove('show');

  // If not locked, apply heat input
  state.inputIntensity = Math.max(state.inputIntensity, 0.5);

  // Always allow boba sipping — even under thermal lock!
  doSipAnimation();
}

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  handleTapMove(e.touches[0]);
}, { passive: false });

canvas.addEventListener('mousemove', (e) => {
  if (state.inputIntensity > 0.1) handleTapMove(e);
});

function handleTapMove(touchOrMouse) {
  const dx = touchOrMouse.clientX - cx;
  const dy = touchOrMouse.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const intensity = Math.max(0, 1 - dist / (Math.min(W, H) * 0.45));
  state.inputIntensity = Math.min(1.0, Math.max(0, intensity));
}

canvas.addEventListener('touchend',    (e) => { e.preventDefault(); handleTapEnd(e); },   { passive: false });
canvas.addEventListener('mouseup',     (e) => { handleTapEnd(e); });

function handleTapEnd() {
  state.inputIntensity = Math.max(0, state.inputIntensity - 0.6);
  stopWarmHum();
}

// ═══════════════════════════════════════════
// RENDER ENGINE — Visual Warmth Aesthetic
// Golden-orange glow · bloom · no danger red
// ═══════════════════════════════════════════

let frameCount = 0;
let dtAccumulator = 0;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width   = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width   = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0);
}

window.addEventListener('resize', resize);
let W=0, H=0, cx=0, cy=0, dpr=1;
function calcCenter() { cx = W/2; cy = H/2; }

// ── Background render ────────────────────────
function renderBg() {
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H) * 0.7);
  let warmth;
  if (state.locked)       warmth = 0.18 + Math.sin(frameCount*0.03)*0.04;
  else if (state.approaching) warmth = 0.06 + ((state.clampedTemp-WARM_START)/(LOCK_THRESHOLD-WARM_START))*0.05;
  else                    warmth = 0;

  bg.addColorStop(0, `rgba(55,28,10,${warmth})`);
  bg.addColorStop(1, '#0a0806');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Title glow enhancement under lock
  if (state.locked) {
    titleGlow.style.background = `radial-gradient(ellipse at 50% 100%,rgba(255,180,60,${0.06 + Math.sin(frameCount*0.04)*0.03}),transparent)`;
  } else {
    titleGlow.style.background = 'radial-gradient(ellipse at 50% 100%,rgba(255,180,60,0),transparent)';
  }
}

// ── Thermal orb render ───────────────────────
function renderThermalOrb() {
  const baseR     = 48;
  const pulseAmt  = Math.sin(frameCount * 0.04) * 2;

  if (state.locked) {
    // Locked: warm golden-orange, pulsing glow with soft bloom
    const warmthPhase = Math.sin(frameCount * 0.03) * 0.15;
    const orbR = baseR + pulseAmt;

    // Outer bloom glow — large and diffuse for plush feel
    const bloom = ctx.createRadialGradient(cx, cy, orbR*0.6, cx, cy, orbR*3.2);
    bloom.addColorStop(0, `rgba(255,170,60,${0.2 + warmthPhase})`);
    bloom.addColorStop(0.4, `rgba(255,140,40,${0.08 + warmthPhase*0.3})`);
    bloom.addColorStop(1, 'rgba(255,120,20,0)');
    ctx.fillStyle = bloom;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR*3.2, 0, Math.PI*2);
    ctx.fill();

    // Orb body — warm amber gradient
    const orbGrad = ctx.createRadialGradient(cx-12, cy-16, 4, cx, cy, orbR);
    orbGrad.addColorStop(0, 'rgba(255,230,170,0.9)');
    orbGrad.addColorStop(0.4, 'rgba(255,180,80,0.85)');
    orbGrad.addColorStop(0.8, 'rgba(240,130,40,0.7)');
    orbGrad.addColorStop(1,  'rgba(200,90,20,0.5)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI*2);
    ctx.fill();

    // Lock icon — soft golden padlock drawn on the orb
    drawLockIcon(cx, cy-6, `rgba(255,240,200,${0.35 + warmthPhase})`);

  } else if (state.approaching) {
    const intensity = (state.clampedTemp - WARM_START) / (LOCK_THRESHOLD - WARM_START);
    const orbR = baseR + pulseAmt + intensity * 4;

    // Growing bloom
    const bloom = ctx.createRadialGradient(cx, cy, orbR*0.4, cx, cy, orbR*(2+intensity*2));
    bloom.addColorStop(0, `rgba(255,160,50,${0.08 + intensity*0.1})`);
    bloom.addColorStop(1, 'rgba(255,120,20,0)');
    ctx.fillStyle = bloom;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR*(2+intensity*2), 0, Math.PI*2);
    ctx.fill();

    const orbGrad = ctx.createRadialGradient(cx-10, cy-14, 3, cx, cy, orbR);
    orbGrad.addColorStop(0, `rgba(255,220,160,${0.7 + intensity*0.2})`);
    orbGrad.addColorStop(0.5, `rgba(255,170,60,${0.6 + intensity*0.2})`);
    orbGrad.addColorStop(1,   `rgba(230,120,30,${0.4 + intensity*0.2})`);
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI*2);
    ctx.fill();

  } else {
    // Cool: soft pearl glow — no heat color
    const orbR = baseR + pulseAmt;
    const bloom = ctx.createRadialGradient(cx, cy, orbR*0.5, cx, cy, orbR*1.8);
    bloom.addColorStop(0, 'rgba(200,190,170,0.06)');
    bloom.addColorStop(1, 'rgba(200,190,170,0)');
    ctx.fillStyle = bloom;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR*1.8, 0, Math.PI*2);
    ctx.fill();

    const orbGrad = ctx.createRadialGradient(cx-10, cy-14, 3, cx, cy, orbR);
    orbGrad.addColorStop(0, 'rgba(230,220,200,0.5)');
    orbGrad.addColorStop(0.6, 'rgba(200,190,170,0.4)');
    orbGrad.addColorStop(1,   'rgba(180,170,150,0.25)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI*2);
    ctx.fill();
  }
}

// ── Draw soft padlock icon on the orb ─────────
function drawLockIcon(x, y, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;
  // Shackle arc
  ctx.beginPath();
  ctx.arc(x, y-3, 5, Math.PI, 0, false);
  ctx.stroke();
  // Body rectangle with rounded corners (simplified)
  ctx.strokeRect(x-6, y+2, 12, 9);
  ctx.restore();
}

// ── Boba cup sipping animation on canvas ─────
function renderBobbaCup() {
  if (!state.bobbaReady) return;

  const cupX = cx + 140;    // positioned to the right of the orb
  const cupY = cy + 20;
  const bobR = 30;

  // Cup body (simple filled shape, drawn on canvas for glow compositing)
  ctx.save();

  // Cup shadow/glow
  if (state.locked) {
    const cupGlow = ctx.createRadialGradient(cupX, cupY+bobR*0.3, bobR*0.2, cupX, cupY+bobR*0.3, bobR*1.5);
    cupGlow.addColorStop(0, 'rgba(255,180,80,0.08)');
    cupGlow.addColorStop(1, 'rgba(255,160,60,0)');
    ctx.fillStyle = cupGlow;
    ctx.beginPath();
    ctx.arc(cupX, cupY+bobR*0.3, bobR*1.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Cup body — trapezoidal shape
  const topW = bobR * 0.7;
  const botW = bobR * 0.9;
  const cupH = bobR * 1.8;

  ctx.beginPath();
  ctx.moveTo(cupX - topW, cupY);                        // top-left rim
  ctx.lineTo(cupX + topW, cupY);                        // top-right rim
  ctx.quadraticCurveTo(cupX + botW*0.95, cupY + cupH*0.1, cupX + botW, cupY + cupH*0.15);   // right-top curve
  ctx.lineTo(cupX + botW*0.85, cupY + cupH*0.75);      // right-bottom area
  ctx.quadraticCurveTo(cupX + botW*0.7, cupY + cupH, cupX, cupY + cupH);             // bottom curve
  ctx.quadraticCurveTo(cupX - botW*0.7, cupY + cupH, cupX - botW*0.85, cupY + cupH*0.75);// left-bottom area
  ctx.lineTo(cupX - botW, cupY + cupH*0.15);           // left-bottom to mid
  ctx.quadraticCurveTo(cupX - topW*0.95, cupY + cupH*0.1, cupX - topW, cupY);        // left-top curve
  ctx.closePath();

  const cupGrad = ctx.createLinearGradient(cupX, cupY, cupX + bobR, cupY + cupH);
  cupGrad.addColorStop(0, 'rgba(55,38,20,0.75)');
  cupGrad.addColorStop(0.5, 'rgba(70,48,26,0.65)');
  cupGrad.addColorStop(1, 'rgba(48,32,16,0.8)');
  ctx.fillStyle = cupGrad;
  ctx.fill();

  // Boba pearls inside — dark circles visible through cup
  const pearlPositions = [
    [-5, -2], [4, 2], [0, 7], [7, -3], [-7, 4]
  ];
  for (const [px, py] of pearlPositions) {
    ctx.beginPath();
    ctx.arc(cupX + px, cupY + cupH*0.5 + py, 2.8, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(38,24,12,0.6)';
    ctx.fill();
  }

  // Straw line
  ctx.beginPath();
  ctx.moveTo(cupX + 5, cupY - 2);
  ctx.lineTo(cupX + 10, cupY - bobR * 1.4);
  ctx.strokeStyle = 'rgba(170,145,100,0.35)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Sipping animation: liquid level dips when currently sipping
  if (currentSipProgress > 0) {
    const sipLevel = currentSipProgress / SIP_DURATION;   // 1.0 → 0.0 as sip progresses
    const liquidY = cupY + cupH * 0.75 - sipLevel * bobR * 0.6;

    ctx.beginPath();
    ctx.moveTo(cupX - bobR*0.82, liquidY);
    ctx.lineTo(cupX + bobR*0.82, liquidY);
    ctx.strokeStyle = 'rgba(255,180,80,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Animated "steam" wisps rising during sip
    if (frameCount % 8 === 0 && state.locked) {
      spawnSteamWisp(cupX + 10, cupY - bobR*1.4);
    }
  }

  ctx.restore();
}

// ── Temperature readout with glow ────────────
function renderTempReadout() {
  const norm = state.clampedTemp / LOCK_THRESHOLD;     // [0..1]
  if (norm < 0.3) {
    tempReadout.classList.remove('visible');
    return;
  }

  tempReadout.classList.add('visible');
  const r  = Math.round(255 * norm);
  const g  = Math.round(180 * norm);
  const b  = Math.round(60   * norm);
  tempReadout.style.color = `rgba(${r},${g},${b},0.7)`;
  tempReadout.textContent = state.clampedTemp.toFixed(1) + '°C';

  if (state.locked) {
    // Gentle pulsing glow on the temperature text — golden-orange, NOT red
    const pulseA = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
    tempReadout.style.textShadow = `0 0 14px rgba(255,200,100,${pulseA}), 0 0 28px rgba(255,160,60,${pulseA*0.4})`;
  } else if (state.approaching) {
    tempReadout.style.textShadow = 'none';
  }

  statusBar.classList.add('visible');
}

// ── Glow overlay — full-screen warm bloom ────
function renderGlowOverlay() {
  if (state.locked || state.approaching) {
    const intensity = state.locked ? 0.14 : ((state.clampedTemp - WARM_START) / (LOCK_THRESHOLD - WARM_START)) * 0.06;
    const pulseA    = state.locked ? Math.sin(frameCount * 0.03) * 0.05 : 0;
    glow.style.opacity = intensity + pulseA;
  } else {
    glow.style.opacity = '0';
  }
}

// ── Cozy Cloud status messages ───────────────
function renderCozyCloud() {
  if (!state.hasInteracted) return;
  cozyCloud.classList.add('visible');

  let msg;
  if (state.locked) {
    // Rotate cozy messages during locked state
    if (frameCount - state.cozyTimer > 180) {   // ~3 seconds between rotations at 60fps
      state.cozyIdx = (state.cozyIdx + 1) % COZY_MESSAGES.locked.length;
      state.cozyTimer = frameCount;
    }
    msg = COZY_MESSAGES.locked[state.cozyIdx];
    cozyCloud.style.color = `rgba(255,230,200,${0.45 + Math.sin(frameCount*0.05)*0.1})`;

  } else if (state.approaching) {
    // Show approaching warmth — no danger language ever
    if (frameCount - state.cozyTimer > 150) {
      state.cozyIdx = (state.cozyIdx + 1) % COZY_MESSAGES.approaching.length;
      state.cozyTimer = frameCount;
    }
    msg = COZY_MESSAGES.approaching[state.cozyIdx];
    cozyCloud.style.color = 'rgba(255,210,160,0.35)';

  } else if (state.sipCount > 0 && !state.locked) {
    // During active sipping when cooling
    msg = COZY_MESSAGES.sipping[state.cozyIdx % COZY_MESSAGES.sipping.length];
    cozyCloud.style.color = 'rgba(255,230,200,0.3)';
  } else {
    // Default cool message
    if (frameCount - state.cozyTimer > 120) {
      state.cozyIdx = (state.cozyIdx + 1) % COZY_MESSAGES.cooling.length;
      state.cozyTimer = frameCount;
    }
    msg = COZY_MESSAGES.cooling[state.cozyIdx];
    cozyCloud.style.color = 'rgba(200,185,160,0.25)';
  }

  cozyCloud.textContent = msg;
}

// ── Boba status text ─────────────────────────
function renderBobaStatus() {
  if (state.sipCount > 0) {
    bobaStatus.classList.add('visible');
    bobaStatus.textContent = `boba sips: ${state.sipCount}`;
  } else {
    bobaStatus.classList.remove('visible');
  }
}

// ── Status bar thermal state text ────────────
function renderStatusBar() {
  if (!state.hasInteracted) return;

  if (state.locked) {
    stateText.textContent   = 'Warm Embrace';
    stateText.style.color   = `rgba(255,210,130,${0.8 + Math.sin(frameCount*0.06)*0.1})`;
    lockBadge.classList.add('locked');
  } else if (state.approaching) {
    stateText.textContent   = 'Approaching Warmth';
    stateText.style.color   = 'rgba(255,170,80,0.55)';
    lockBadge.classList.remove('locked');
  } else {
    stateText.textContent   = 'Cool & Clear';
    stateText.style.color   = 'rgba(200,180,140,0.35)';
    lockBadge.classList.remove('locked');
  }
}

// ═══════════════════════════════════════════
// STEAM PARTICLE SYSTEM
// Small wisps rising from the bobba cup
// ═══════════════════════════════════════════

function spawnSteamWisp(x, y) {
  steamParticles.push({
    x: x + (Math.random()-0.5)*8,
    y: y,
    vx: (Math.random()-0.5)*0.3,
    vy: -0.4 - Math.random()*0.3,
    life: 1.0,
    decay: 0.005 + Math.random()*0.005,
    size: 2 + Math.random()*3
  });
}

function updateSteam() {
  for (let i = steamParticles.length-1; i >= 0; i--) {
    const p = steamParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy -= 0.002;       // slight upward acceleration
    p.life -= p.decay;
    if (p.life <= 0) {
      steamParticles.splice(i, 1);
    }
  }
}

function renderSteam() {
  for (const p of steamParticles) {
    const alpha = p.life * 0.35;
    ctx.beginPath();
    const wispGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
    wispGrad.addColorStop(0, `rgba(255,240,220,${alpha})`);
    wispGrad.addColorStop(1, 'rgba(255,230,200,0)');
    ctx.fillStyle = wispGrad;
    ctx.arc(p.x, p.y, p.size*2, 0, Math.PI*2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════
// STATE MACHINE — Thermal & Lock States
// ═══════════════════════════════════════════

function updateThermal(dt) {
  const prevClamped = state.clampedTemp;
  const wasLocked   = state.locked;

  // Raw physics (never modified — wrapped by clamp)
  const rawOutput = rawThermalPhysics(dt, state.inputIntensity);

  // Apply hard thermal clamp
  state.rawTemp     = rawOutput;
  state.clampedTemp = clampThermal(rawOutput);

  // Lock engagement: clamped temp at threshold AND user is actively heating
  if (state.clampedTemp >= LOCK_THRESHOLD && state.inputIntensity > 0.05) {
    if (!wasLocked) {
      // ═══ First-time lock engagement ═══
      state.locked   = true;
      state.cozyIdx  = 0;

      // Audio cue: the *ting* (one-shot per session)
      playTing();

      // Haptic feedback on lock engagement
      triggerTingHaptic();

      // Visual: pulse ring expansion
      pulse.classList.remove('pulse');
      void pulse.offsetWidth;          // force reflow to restart CSS animation
      pulse.classList.add('pulse');

      // Begin sustained haptics for the locked state
      startLockedHaptics();

      // Start steam hiss — soft background steam sound
      playSteamHiss(0.8);

      silenceAllAlarms();
    }
    state.approaching = false;

  } else if (state.clampedTemp >= WARM_START) {
    // Approaching warmth zone: between warm_start and lock_threshold
    state.locked   = false;
    state.approaching = true;
    stopLockedHaptics();

  } else {
    // Cool state: below warm_start threshold
    state.locked       = false;
    state.approaching  = false;
    stopLockedHaptics();
  }

  // Update status text and messages every frame for dynamic responsiveness
  renderCozyCloud();
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════

let lastTimestamp = 0;

function loop(timestamp) {
  requestAnimationFrame(loop);

  if (lastTimestamp === 0) { lastTimestamp = timestamp; return; }

  const rawDt    = Math.min((timestamp - lastTimestamp) / 1000, 0.05);  // cap dt
  lastTimestamp   = timestamp;
  frameCount++;

  // Fixed-timestep physics update
  dtAccumulator += rawDt;
  let steps = 0;
  while (dtAccumulator >= FRAME_DT && steps < 4) {
    updateThermal(FRAME_DT);
    dtAccumulator -= FRAME_DT;
    steps++;
  }
  if (dtAccumulator > FRAME_DT * 2) dtAccumulator = 0;

  // ── Sipping animation progression ──────
  if (currentSipProgress > 0) currentSipProgress--;
  if (sipCooldown > 0) sipCooldown--;

  // ── Steam updates & render ─────────────
  updateSteam();
  renderSteam();

  // ── Render pass ────────────────────────
  ctx.clearRect(0, 0, W, H);
  calcCenter();
  renderBg();
  renderThermalOrb();
  renderBobbaCup();
  renderTempReadout();
  renderGlowOverlay();
  renderStatusBar();
  renderBobaStatus();
}

// ── Init ─────────────────────────────────────
resize();
calcCenter();
hintEl.classList.add('show');
requestAnimationFrame(loop);

})();
</script>
