<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warm Honey Breath</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="onboarding-overlay">
      <div id="onboarding-content">
        <p id="onboarding-tagline">Breathe in. Catch the peak. Let it melt.</p>
        <hr class="divider">
        <p id="onboarding-step-inhale">Hold the circle to inhale.</p>
        <p id="onboarding-step-freeze">Release at the ripple's peak to freeze.</p>
        <p id="onboarding-step-exhale">Watch the glow melt away and begin again.</p>
        <p id="onboarding-hint-dismiss">Tap anywhere to begin</p>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
