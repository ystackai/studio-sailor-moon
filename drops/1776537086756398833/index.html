<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Heavy Void</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#06060c;font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent}
canvas{display:block;position:absolute;top:0;left:0}
#void-overlay{position:fixed;inset:0;background:#050210;opacity:0;pointer-events:none;z-index:10}
#ui{position:fixed;bottom:28px;left:0;right:0;text-align:center;z-index:20;pointer-events:none}
#prompt{font-size:13px;color:rgba(180,170,255,0.4);letter-spacing:0.12em;opacity:0;transition:opacity 1.2s ease-out}
#prompt.show{opacity:1}
#name{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;font-size:11px;color:rgba(180,170,255,0.12);letter-spacing:0.3em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="void-overlay"></div>
<div id="name">the hiccough</div>
<div id="ui"><div id="prompt">drag toward the cloud&#8230;</div></div>
<script>
(()=>{

// ═══════════════════════════════════════════════
// THE HEAVY VOID — Delta-time Independent Physics
// High-damping drag → collision haptics → spring recovery
// Pixel-5 optimized: fixed-timestep, no GC thrash
// ═══════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false });
const overlay= document.getElementById('void-overlay');
const promptEl = document.getElementById('prompt');

// ── Performance targets ────────────────────
const isMobile   = /Mobi|Android|iPhone/i.test(navigator.userAgent);
const TARGET_FPS = 60;
const FRAME_DT   = 1 / TARGET_FPS;           // 16.667ms
const MAX_DT     = 1 / 20;                   // clamp, prevents spiral-of-death
const PHYSICS_DT = FRAME_DT;                 // fixed 16.667ms physics steps

// ── Physics constants (molasses feel) ──────
const VOID_RADIUS         = 58;              // radius of The Hiccough/Cloud
const DRAG_THRESHOLD      = 280;             // px where drag field begins
const BASE_DRAG           = 0.975;           // baseline damping far from void
const PEAK_DRAG           = 0.991;           // near-max at collision boundary
const DRAG_CURVE_POWER    = 3.2;             // steeper exponent = thicker syrup

// Recovery spring (yielding but not floating)
const SPRING_K            = 0.065;           // spring constant — firm yield
const SPRING_CRT_DAMP     = 0.86;            // critical damping coefficient

// Collision / impact
const COLLISION_DIST      = VOID_RADIUS + 14;// collision boundary
const IMPACT_DIM_MAX      = 0.55;            // max screen dimming (the void closes)
const DIM_RECOVERY_RATE   = 0.028;           // overlay fade-back per physics step

// Haptics
const VIB_PATTERNS        = [160, 30, 200, 40, 250];  // all-motor deep pattern

// ── State ──────────────────────────────────
let W, H, dpr, centerX, centerY;
const interaction  = { x:0, y:0, vx:0, vy:0, px:0, py:0, dragging:false, colliding:false, impactPhase:false };
const voidState    = { dimAmount:0, settleY:0, settled:false, settleTimer:0 };
let frameCount     = 0;
let lastTimestamp  = 0;
let dtAccumulator  = PHYSICS_DT;

// ── Canvas sizing ──────────────────────────
function resize() {
  dpr           = Math.min(window.devicePixelRatio || 1, 2);
  W             = window.innerWidth;
  H             = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  centerX = W / 2;
  centerY = H / 2;
}
window.addEventListener('resize', resize);

// ── Pre-allocated particle pool (zero GC) ─
const N_PARTICLES   = isMobile ? 55 : 90;
const particles     = new Array(N_PARTICLES);
const TEMP_VEC2     = { x:0, y:0 };       // reuse to avoid allocations

function spawnParticle() {
  const angle = Math.random() * Math.PI * 2;
  const dist  = VOID_RADIUS + 12 + Math.random() * 130;
  return {
    x: centerX + Math.cos(angle) * dist,
    y: centerY + Math.sin(angle) * dist,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    life: 1, decay: 0.003 + Math.random() * 0.007,
    size: 1 + Math.random() * 2.5,
    hue: 240 + Math.random() * 40 - 20,
  };
}

function initParticles() {
  for (let i = 0; i < N_PARTICLES; i++) {
    particles[i] = spawnParticle();
    particles[i].life = Math.random();
  }
}

// ── Audio Engine (Web Audio API) ───────────
let audioCtx   = null;
let impactAct  = null;          // audioParam for impact gain staging
let swooshGain = null;
let creakGain  = null;
let dragSwooshNode = null;      // looping brown noise for approach
let creakOsc       = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ── Layer 1: Brown-noise thud (low-passed, percussive impact) ──
    const t0 = audioCtx.currentTime;
    const iBuf  = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.7, audioCtx.sampleRate);
    const iD    = iBuf.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < iD.length; i++) {
      const white = Math.random() * 2 - 1;
      lastOut = (lastOut + (0.02 * white)) / 1.02;   // integrate → brown noise
      iD[i] = lastOut * 3.5;
    }
    const iSrc = audioCtx.createBufferSource();
    iSrc.buffer = iBuf;
    impactAct = audioCtx.createGain();
    impactAct.gain.setValueAtTime(0, t0);
    impactAct.gain.linearRampToValueAtTime(1, t0 + 0.015);   // snappy attack
    impactAct.gain.exponentialRampToValueAtTime(0.001, t0 + 0.7);
    const iLP = audioCtx.createBiquadFilter();
    iLP.type = 'lowpass'; iLP.frequency.value = 160; iLP.Q.value = 2;
    const iBP = audioCtx.createBiquadFilter();
    iBP.type = 'peaking'; iBP.frequency.value = 60;  iBP.gain.value = 8; iBP.Q.value = 3;
    iSrc.connect(iLP).connect(iBP).connect(impactAct).connect(audioCtx.destination);
    iSrc.start(t0);

    // ── Layer 2: Sub-bass oscillator (~35 Hz, felt more than heard) ──
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(42, t0);
    sub.frequency.exponentialRampToValueAtTime(26, t0 + 0.65);
    const sg = audioCtx.createGain();
    sg.gain.setValueAtTime(0, t0);
    sg.gain.linearRampToValueAtTime(0.55, t0 + 0.01);
    sg.gain.exponentialRampToValueAtTime(0.001, t0 + 0.8);
    sub.connect(sg).connect(audioCtx.destination);
    sub.start(t0);

    // ── Layer 3: Wet swoosh (filtered noise, active during approach) ──
    const swooshLen = audioCtx.sampleRate * 3;
    const sBuf      = audioCtx.createBuffer(1, swooshLen, audioCtx.sampleRate);
    const sD        = sBuf.getChannelData(0);
    lastOut = 0;
    for (let i = 0; i < sD.length; i++) {
      const white = Math.random() * 2 - 1;
      lastOut = (lastOut + (0.03 * white)) / 1.03;   // mostly brown, some air
      sD[i] = lastOut * 2.5;
    }
    dragSwooshNode = audioCtx.createBufferSource();
    dragSwooshNode.buffer = sBuf;
    dragSwooshNode.loop = true;
    swooshGain = audioCtx.createGain();
    swooshGain.gain.setValueAtTime(0, t0);
    const sLP  = audioCtx.createBiquadFilter();
    sLP.type = 'lowpass'; sLP.frequency.value = 320; sLP.Q.value = 2.5;
    const sBP  = audioCtx.createBiquadFilter();
    sBP.type = 'bandpass'; sBP.frequency.value = 150; sBP.Q.value = 5;
    dragSwooshNode.connect(sLP).connect(sBP).connect(swooshGain).connect(audioCtx.destination);
    dragSwooshNode.start(t0);

    // ── Layer 4: Plushie creak (wobbly saw + resonance) ──
    creakOsc = audioCtx.createOscillator();
    creakOsc.type = 'sawtooth';
    creakOsc.frequency.value = 75;
    creakGain = audioCtx.createGain();
    creakGain.gain.setValueAtTime(0, t0);
    const clp = audioCtx.createBiquadFilter();
    clp.type = 'lowpass'; clp.frequency.value = 220; clp.Q.value = 3;
    creakOsc.connect(clp).connect(creakGain).connect(audioCtx.destination);
    creakOsc.start(t0);

  } catch(e) { console.warn('[Heavy Void] Web Audio unavailable:', e); }
}

function playImpactAudio() {
  if (!audioCtx || !impactAct) return;
  // re-trigger layers for repeat impacts
  const t = audioCtx.currentTime;
  impactAct.gain.cancelScheduledValues(t);
  impactAct.gain.setValueAtTime(0, t);
  impactAct.gain.linearRampToValueAtTime(1, t + 0.015);
  impactAct.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
}

// ── Haptics (Vibration API — all motors) ───
function playImpactHaptic() {
  try { if (navigator.vibrate) navigator.vibrate(VIB_PATTERNS); } catch(e) {}
}

// ── Input handling ─────────────────────────
function pointerDown(x, y) {
  initAudio();
  interaction.dragging = true;
  interaction.colliding = false;
  interaction.impactPhase = false;
  interaction.x = x; interaction.y = y;
  interaction.px = x; interaction.py = y;
  interaction.vx = 0; interaction.vy = 0;
  voidState.dimAmount = 0;
  promptEl.classList.remove('show');
}

function pointerMove(x, y) {
  if (!interaction.dragging) return;
  interaction.px = interaction.x;
  interaction.py = interaction.y;
  interaction.x  = x;
  interaction.y  = y;
}

function pointerUp() {
  // don't break collision state — user stays in the hug
  if (!interaction.colliding) {
    interaction.dragging = false;
  }
}

canvas.addEventListener('mousedown',      e => pointerDown(e.clientX, e.clientY));
canvas.addEventListener('mousemove',      e => pointerMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup',        pointerUp);
canvas.addEventListener('mouseleave',     pointerUp);
canvas.addEventListener('touchstart',  (e) => { e.preventDefault(); pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove',   (e) => { e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchend',       pointerUp);

// ── Idle prompt ────────────────────────────
let idleTimer = 0;
function checkIdle(dt) {
  if (!interaction.dragging && !interaction.colliding && !voidState.settled) {
    idleTimer += dt;
    if (idleTimer > 2.5 && !promptEl.classList.contains('show'))
      promptEl.classList.add('show');
  } else { idleTimer = 0; promptEl.classList.remove('show'); }
}

// ════════════════════════════════════════════
//  PHYSICS STEP — fixed timestep, dt-independent
// ════════════════════════════════════════════
function physicsStep(dtNorm) {
  // dtNorm = dt / PHYSICS_DT_TARGET  (normalized to 1.0 per step at 60 fps)

  if (interaction.dragging && !interaction.colliding) {
    // ── Approach drag: exponential molasses field ──
    const dx  = centerX - interaction.x;
    const dy  = centerY - interaction.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 1 && dist < DRAG_THRESHOLD) {
      const t = Math.max(0, 1 - dist / DRAG_THRESHOLD);
      const dragCoeff = BASE_DRAG + (PEAK_DRAG - BASE_DRAG) * Math.pow(t, DRAG_CURVE_POWER);

      // Dampen existing velocity
      interaction.vx *= Math.pow(dragCoeff, dtNorm);
      interaction.vy *= Math.pow(dragCoeff, dtNorm);

      // Add gentle drift toward dragged position (soft steering)
      const steerX = (interaction.x - interaction.px) * 0.12;
      const steerY = (interaction.y - interaction.py) * 0.12;
      interaction.vx += steerX;
      interaction.vy += steerY;
    }

    // Integrate position
    interaction.x += interaction.vx * dtNorm;
    interaction.y += interaction.vy * dtNorm;

    // Screen bounds (hard clamp, no bounce)
    interaction.x = Math.max(18, Math.min(W - 18, interaction.x));
    interaction.y = Math.max(18, Math.min(H - 18, interaction.y));

    // ── Collision detection ──
    const nDx = centerX - interaction.x;
    const nDy = centerY - interaction.y;
    const nDist = Math.sqrt(nDx * nDx + nDy * nDy);

    if (nDist <= COLLISION_DIST && !interaction.impactPhase) {
      interaction.colliding   = true;
      interaction.impactPhase = true;
      triggered               = true;
      triggerImpact(nDist);
    }

    // ── Contact physics: super-damping + centering pull ──
    if (interaction.colliding) {
      const contactDepth = Math.min(1, (COLLISION_DIST - nDist) / COLLISION_DIST);

      // Super-heavy drag while in contact
      const superDrag = 0.945 + contactDepth * 0.05;
      interaction.vx *= Math.pow(superDrag, dtNorm);
      interaction.vy *= Math.pow(superDrag, dtNorm);

      // Gentle centering pull (the void "hugs" you)
      const pullStr = 0.018 * (contactDepth + 0.3);
      interaction.vx += nDx * pullStr;
      interaction.vy += nDy * pullStr;

      // Soft constraint: keep inside collision circle
      if (nDist > COLLISION_DIST - 2) {
        const pushBack = (nDist - (COLLISION_DIST - 2)) / nDist * 0.3;
        interaction.vx -= nDx * pushBack;
        interaction.vy -= nDy * pushBack;
      }

      // Reposition inside bounds
      interaction.x += interaction.vx * dtNorm;
      interaction.y += interaction.vy * dtNorm;
    }

  } else if (!interaction.dragging && interaction.colliding) {
    // ── Recovery spring: yielding but firm ──
    const dx  = centerX - interaction.x;
    const dy  = centerY - interaction.y;

    // Spring force
    interaction.vx += dx * SPRING_K;
    interaction.vy += dy * SPRING_K;

    // Critical damping (prevents oscillation)
    interaction.vx *= Math.pow(SPRING_CRT_DAMP, dtNorm);
    interaction.vy *= Math.pow(SPRING_CRT_DAMP, dtNorm);

    // Integrate
    interaction.x += interaction.vx * dtNorm;
    interaction.y += interaction.vy * dtNorm;

    const settleDist = Math.sqrt(dx * dx + dy * dy);
    const settleSpeed = Math.sqrt(interaction.vx ** 2 + interaction.vy ** 2);

    if (settleDist < 4 && settleSpeed < 0.4) {
      voidState.settled = true;
    }

    // Fade after settled → reset cycle
    if (voidState.settled) {
      voidState.settleTimer += dtNorm * PHYSICS_DT * 1000 / 16.667;
      if (voidState.settleTimer > 4) {
        interaction.colliding = false;
        interaction.impactPhase = false;
        voidState.dimAmount     *= 0.93;
        voidState.settled       = false;
        voidState.settleY      *= 0.96;
      }
    }
  }

  // ── Impact dimming decay ──
  if (!interaction.impactPhase && voidState.dimAmount > 0) {
    voidState.dimAmount -= DIM_RECOVERY_RATE * dtNorm;
    if (voidState.dimAmount < 0) voidState.dimAmount = 0;
  }

  // ── Squeeze displacement (subtle breathing) ──
  if (interaction.colliding || interaction.impactPhase) {
    const breath  = Math.sin(performance.now() * 0.0025);
    const compress = breath * 2.5 + 3.5;
    voidState.settleY += (compress - voidState.settleY) * 0.04 * dtNorm;
  } else {
    voidState.settleY *= Math.pow(0.94, dtNorm);
  }

  // ── Audio modulation per physics step ──
  updateDragAudio();
  updateCreak();
}

// ── Impact trigger ─────────────────────────
let triggered = false;

function triggerImpact(closestDist) {
  voidState.dimAmount = IMPACT_DIM_MAX;
  playImpactAudio();
  playImpactHaptic();
}

// ── Audio modulation helpers ───────────────
function updateDragAudio() {
  if (!swooshGain || !audioCtx) return;
  const speed = Math.sqrt(interaction.vx ** 2 + interaction.vy ** 2);
  const vol   = Math.min(speed / 90, 1) * 0.22;
  swooshGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
}

function updateCreak() {
  if (!creakGain || !audioCtx || !interaction.colliding) return;
  const t = audioCtx.currentTime;
  const intensity = voidState.dimAmount;
  creakGain.gain.linearRampToValueAtTime(intensity * 0.1, t + 0.03);
  if (creakOsc) {
    creakOsc.frequency.linearRampToValueAtTime(72 - intensity * 25, t + 0.04);
  }
}

// ════════════════════════════════════════════
//  RENDER PIPELINE — optimized for 60 fps
// ════════════════════════════════════════════

// ── Pre-generated background canvas ────────
let bgCanvas, bgCtx;

function generateBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width  = W * dpr;
  bgCanvas.height = H * dpr;
  bgCtx = bgCanvas.getContext('2d');
  bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Deep void gradient
  const grad = bgCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W,H) * 0.75);
  grad.addColorStop(0, '#14112a');
  grad.addColorStop(0.45, '#0b0a18');
  grad.addColorStop(1, '#06060c');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  // Static stars (cheap rect fills)
  for (let i = 0; i < 70; i++) {
    bgCtx.fillStyle = `rgba(180,170,255,${0.08 + Math.random() * 0.2})`;
    bgCtx.fillRect(Math.random()*W, Math.random()*H, 1, 1);
  }
}

// ── Render: The Hiccough (blob cloud) ──────
function renderVoid(t) {
  const pulse = Math.sin(t * 0.001) * 3.5;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Outer glow — intensifies on impact
  const vigMult = interaction.colliding ? 2.2 : 1;
  const glowR   = (VOID_RADIUS + pulse + 28) * vigMult;
  const oy      = centerY + voidState.settleY * 0.3;
  const outerGlow = ctx.createRadialGradient(centerX, oy, VOID_RADIUS*0.4, centerX, oy, glowR);
  outerGlow.addColorStop(0, `rgba(120,80,200,${0.15 * vigMult})`);
  outerGlow.addColorStop(0.5, `rgba(80,40,160,${0.06 * vigMult})`);
  outerGlow.addColorStop(1, 'rgba(40,20,100,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath(); ctx.arc(centerX, oy, glowR, 0, Math.PI*2); ctx.fill();

  // Main cloud body — organic wobbly circle
  ctx.globalCompositeOperation = 'source-over';

  const coreGrad = ctx.createRadialGradient(
    centerX - 8, oy - 5, VOID_RADIUS * 0.1,
    centerX, oy, VOID_RADIUS + pulse * 0.4
  );
  if (interaction.colliding) {
    // Darker when squeezed — the void presses in
    coreGrad.addColorStop(0, '#c8bce8');
    coreGrad.addColorStop(0.3, '#9078c0');
    coreGrad.addColorStop(0.65, '#4a2888');
    coreGrad.addColorStop(1, '#1e0e40');
  } else {
    coreGrad.addColorStop(0, '#d4c8f0');
    coreGrad.addColorStop(0.3, '#a090d0');
    coreGrad.addColorStop(0.7, '#6048a0');
    coreGrad.addColorStop(1, '#2a1850');
  }

  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  const N_BLOB = 14;
  for (let i = 0; i <= N_BLOB; i++) {
    const a     = (i / N_BLOB) * Math.PI * 2;
    const wobble = Math.sin(a*3 + t*0.0015)*4 + Math.cos(a*5 + t*0.001)*2;
    const r      = VOID_RADIUS + pulse*0.4 + wobble;
    if (i === 0) ctx.moveTo(centerX + Math.cos(a)*r, oy + Math.sin(a)*r);
    else         ctx.lineTo     (centerX + Math.cos(a)*r, oy + Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();

  // Highlight — "hiccough" puff
  const hlGrad = ctx.createRadialGradient(centerX-14, oy-18, 0, centerX-12, oy-15, 26);
  hlGrad.addColorStop(0, 'rgba(240,230,255,0.45)');
  hlGrad.addColorStop(1, 'rgba(240,230,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath(); ctx.arc(centerX-12, oy-15, 26, 0, Math.PI*2); ctx.fill();

  // Touch glow — intensifies as user approaches
  if (!interaction.colliding && interaction.dragging) {
    const dToVoid = Math.sqrt((centerX - interaction.x)**2 + (oy - interaction.y)**2);
    if (dToVoid < DRAG_THRESHOLD * 1.5) {
      const prox = Math.max(0, 1 - dToVoid / (DRAG_THRESHOLD*1.5));
      ctx.globalCompositeOperation = 'lighter';
      const proxGlow = ctx.createRadialGradient(centerX, oy, 0, centerX, oy, VOID_RADIUS + prox * 40);
      proxGlow.addColorStop(0, `rgba(180,140,255,${prox * 0.2})`);
      proxGlow.addColorStop(1, 'rgba(180,140,255,0)');
      ctx.fillStyle = proxGlow;
      ctx.beginPath(); ctx.arc(centerX, oy, VOID_RADIUS + prox*40, 0, Math.PI*2); ctx.fill();
    }
  }

  // Label (barely visible)
  if (!interaction.dragging && !interaction.colliding && !voidState.settled) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(180,170,255,0.07)';
    ctx.font = '10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('the hiccough', centerX, oy + VOID_RADIUS + 32);
  }

  ctx.restore();
}

// ── Render: Particles with molasses drag ───
function renderParticles(t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < N_PARTICLES; i++) {
    const p = particles[i];

    // Gravity-like attraction to void center
    const dxV = centerX - p.x;
    const dyV = centerY - p.y;
    const distP = Math.sqrt(dxV*dxV + dyV*dyV);

    if (distP > 1) {
      const attract = 0.12 / (distP * 0.08);
      p.vx += (dxV / distP) * attract;
      p.vy += (dyV / distP) * attract;
    }

    // Molasses drag — heavier near void
    const proxDrag = interaction.colliding ? 0.92 : (interaction.dragging ? 0.95 : 0.98);
    p.vx *= proxDrag;
    p.vy *= proxDrag;

    // Update position
    p.x += p.vx;
    p.y += p.vy;

    // Life cycle & respawn
    const lifeMul = voidState.settled ? 0.15 : 0.4;
    p.life -= p.decay;
    if (p.life <= 0) {
      Object.assign(p, spawnParticle());
      p.life = Math.random();
    }

    ctx.fillStyle = `hsla(${p.hue},60%,70%,${p.life * lifeMul})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }

  ctx.restore();
}

// ── Render: Drag trail & proximity effects ─
function renderDragEffects() {
  if (!interaction.dragging || interaction.colliding) return;

  const speed = Math.sqrt(interaction.vx**2 + interaction.vy**2);
  const intensity = Math.min(speed / 70, 1);
  if (intensity < 0.06) return;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Motion trail
  const dxT = interaction.x - interaction.px;
  const dyT = interaction.y - interaction.py;
  const trailLen = Math.sqrt(dxT*dxT + dyT*dyT);
  if (trailLen > 2) {
    for (let i = 0; i < Math.min(trailLen, 28); i++) {
      const tt = i / trailLen;
      ctx.fillStyle = `rgba(140,100,220,${(1-tt)*intensity*0.22})`;
      ctx.fillRect(interaction.px + dxT*tt, interaction.py + dyT*tt, 2 + intensity*3, 2 + intensity*3);
    }
  }

  // Finger proximity glow near void
  const dToVoid = Math.sqrt((centerX-interaction.x)**2 + (centerY-interaction.y)**2);
  if (dToVoid < DRAG_THRESHOLD) {
    const prox = 1 - dToVoid / DRAG_THRESHOLD;
    const fR   = 28 + prox * 45;
    const fG   = ctx.createRadialGradient(interaction.x, interaction.y, 0, interaction.x, interaction.y, fR);
    fG.addColorStop(0, `rgba(140,100,220,${prox*0.13})`);
    fG.addColorStop(1, 'rgba(140,100,220,0)');
    ctx.fillStyle = fG;
    ctx.beginPath(); ctx.arc(interaction.x, interaction.y, fR, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ════════════════════════════════════════════
//  MAIN LOOP — fixed-timestep accumulator
// ════════════════════════════════════════════
function loop(timestamp) {
  requestAnimationFrame(loop);
  if (lastTimestamp === 0) { lastTimestamp = timestamp; return; }

  const rawDt   = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
  lastTimestamp = timestamp;
  frameCount++;

  // ── Fixed-timestep accumulator ──────────
  dtAccumulator += rawDt * 1000;  // ms into accumulator
  let steps = 0;
  while (dtAccumulator >= PHYSICS_DT * 1000 && steps < 5) {
    const dtN = dtAccumulator / (PHYSICS_DT * 1000);  // normalized to physics step
    physicsStep(dtN);
    dtAccumulator -= PHYSICS_DT * 1000;
    steps++;
  }
  if (dtAccumulator > PHYSICS_DT * 2000) dtAccumulator = 0;

  checkIdle(rawDt);

  // ── Render pass ─────────────────────────
  ctx.drawImage(bgCanvas, 0, 0, W, H);

  // Void dim overlay
  if (voidState.dimAmount > 0.005) {
    ctx.fillStyle = `rgba(2,1,6,${voidState.dimAmount})`;
    ctx.fillRect(0, 0, W, H);

    // Peripheral vignette during impact
    if (voidState.dimAmount > 0.12) {
      const vigAlpha = (voidState.dimAmount - 0.12) * 0.75;
      const vigG = ctx.createRadialGradient(centerX, centerY, VOID_RADIUS*0.8, centerX, centerY, Math.max(W,H)*0.65);
      vigG.addColorStop(0, 'rgba(2,1,6,0)');
      vigG.addColorStop(1, `rgba(2,1,6,${vigAlpha})`);
      ctx.fillStyle = vigG;
      ctx.fillRect(0, 0, W, H);
    }
    overlay.style.opacity = voidState.dimAmount * 0.45;
  } else {
    overlay.style.opacity = '0';
  }

  renderVoid(timestamp);
  renderParticles(timestamp);
  renderDragEffects();

  // Settled hug glow — gentle breathing pulse
  if (voidState.settled) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const hugPulse = Math.sin(timestamp * 0.0015) * 4;
    const oyH      = centerY + voidState.settleY * 0.3;
    const hugG     = ctx.createRadialGradient(centerX, oyH, 0, centerX, oyH, VOID_RADIUS + 42 + hugPulse);
    hugG.addColorStop(0, 'rgba(200,160,255,0.07)');
    hugG.addColorStop(0.5, 'rgba(160,120,240,0.03)');
    hugG.addColorStop(1, 'rgba(120,80,200,0)');
    ctx.fillStyle = hugG;
    ctx.beginPath(); ctx.arc(centerX, oyH, VOID_RADIUS+42+hugPulse, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    if (voidState.settleTimer > 1.2) {
      const textAlpha = Math.min((voidState.settleTimer - 1.2) * 0.25, 0.22);
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(180,170,255,${textAlpha})`;
      ctx.font = '11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('being held', centerX, centerY + VOID_RADIUS + 42);
    }
  }
}

// ── Init ───────────────────────────────────
resize();
initParticles();
generateBackground();
requestAnimationFrame(loop);

})();
</script>
