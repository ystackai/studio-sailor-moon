<html lang="en">

    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a1929, #1a3a5f, #0a1929);
            font-family: 'Patrick Hand', cursive;
            height: 100vh;
            width: 100vw;
            position: relative;
            touch-action: none;
        }

        #sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .lantern {
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s;
            will-change: transform;
        }

        .lantern-body {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5c27a, #f1a74e);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            box-shadow: 
                0 0 20px rgba(245, 194, 122, 0.7),
                0 0 40px rgba(245, 194, 122, 0.5),
                inset 0 0 10px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform-origin: center;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lantern-body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 40%);
            border-radius: inherit;
        }

        .lantern-wish {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Caveat', cursive;
            font-size: 12px;
            text-align: center;
            color: #5d2906;
            max-width: 80%;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            padding: 4px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .lantern-string {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 30px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.7), transparent);
        }

        .lantern-shadow {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.5;
        }

        .moon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(224, 224, 224, 0.6),
                0 0 60px rgba(224, 224, 224, 0.3);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .moon::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 15px;
            width: 15px;
            height: 15px;
            background: rgba(180, 180, 180, 0.7);
            border-radius: 50%;
        }

        .moon::after {
            content: "";
            position: absolute;
            top: 30px;
            left: 35px;
            width: 10px;
            height: 10px;
            background: rgba(180, 180, 180, 0.7);
            border-radius: 50%;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f5c27a;
            border-radius: 50%;
            box-shadow: 0 0 8px #f5c27a;
            opacity: 0;
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 2s;
            max-width: 80%;
        }

        .instructions.fade-out {
            opacity: 0;
        }

        .lantern-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .lantern-container .lantern {
            pointer-events: none;
        }

        .lantern-container .lantern.active {
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .lantern-wish {
                font-size: 10px;
            }

            .moon {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

        // Initialize stars
        function initStars() {
            const sky = document.getElementById('sky');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.width = `${Math.random() * 3 + 1}px`;
                star.style.height = star.style.width;
                star.style.setProperty('--duration', `${Math.random() * 5 + 2}s`);
                sky.appendChild(star);
            }
        }

        // Generate random wish
        function generateWish() {
            const randomIndex = Math.floor(Math.random() * gameState.wishBank.length);
            return gameState.wishBank[randomIndex];
        }

        // Create a lantern
        function createLantern(x, y) {
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.style.left = `${x}px`;
            lantern.style.top = `${y}px`;

            // Random size and depth
            const size = Math.random() * 40 + 20;
            const depth = Math.random();
            const scale = 0.5 + depth * 0.7; // 0.5 to 1.2 scale
            const opacity = 0.6 + depth * 0.4; // 0.6 to 1.0 opacity

            lantern.style.width = `${size}px`;
            lantern.style.height = `${size}px`;
            lantern.style.transform = `scale(${scale})`;
            lantern.style.opacity = opacity;

            // Add lantern body
            const body = document.createElement('div');
            body.className = 'lantern-body';

            // Add string
            const string = document.createElement('div');
            string.className = 'lantern-string';

            // Add wish text
            const wish = document.createElement('div');
            wish.className = 'lantern-wish';
            wish.textContent = generateWish();

            // Add shadow
            const shadow = document.createElement('div');
            shadow.className = 'lantern-shadow';

            // Add elements to lantern
            lantern.appendChild(string);
            lantern.appendChild(body);
            lantern.appendChild(wish);
            lantern.appendChild(shadow);

            // Add event listeners
            lantern.addEventListener('click', () => {
                const wishElement = lantern.querySelector('.lantern-wish');
                if (wishElement.style.opacity === '1') {
                    wishElement.style.opacity = '0';
                } else {
                    wishElement.style.opacity = '1';
                }
            });

            // Add touch start event for mobile
            let touchTimer;
            lantern.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchTimer = setTimeout(() => {
                    pulseLantern(lantern);
                }, 500);
            });

            lantern.addEventListener('touchend', () => {
                clearTimeout(touchTimer);
            });

            // Add mouse down event for desktop
            lantern.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchTimer = setTimeout(() => {
                    pulseLantern(lantern);
                }, 500);
            });

            lantern.addEventListener('mouseup', () => {
                clearTimeout(touchTimer);
            });

            // Add to container
            document.getElementById('lanternContainer').appendChild(lantern);

            // Add to game state
            gameState.lanterns.push({
                element: lantern,
                x: x,
                y: y,
                size: size,
                scale: scale,
                depth: depth,
                vx: (Math.random() - 0.5) * 0.5, // slight horizontal drift
                vy: -1 - Math.random() * 0.5, // upward movement
                originalY: y,
                pulseActive: false,
                wish: wish.textContent
            });

            gameState.lanternCount++;

            // Show moon after 100 lanterns
            if (gameState.lanternCount >= 100 && !gameState.moonVisible) {
                showMoon();
            }

            // Start audio after first lantern
            if (gameState.lanternCount === 1 && !gameState.audioStarted) {
                startAudio();
            }

            return lantern;
        }

        // Pulse lantern effect
        function pulseLantern(lanternElement) {
            const body = lanternElement.querySelector('.lantern-body');
            const wishElement = lanternElement.querySelector('.lantern-wish');

            if (!lanternElement.pulseActive) {
                lanternElement.pulseActive = true;

                // Create sparks
                for (let i = 0; i < 8; i++) {
                    createSpark(lanternElement);
                }

                // Add pulse animation
                body.classList.add('pulse');
                setTimeout(() => {
                    body.classList.remove('pulse');
                    lanternElement.pulseActive = false;
                }, 500);
            }
        }

        // Create spark particle
        function createSpark(lanternElement) {
            const spark = document.createElement('div');
            spark.className = 'spark';

            const rect = lanternElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            spark.style.left = `${x}px`;
            spark.style.top = `${y}px`;

            document.body.appendChild(spark);

            // Random direction and distance
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 50 + 20;
            const duration = Math.random() * 0.5 + 0.5;

            // Animate spark
            const animation = spark.animate([
                { transform: `translate(0, 0)`, opacity: 1 },
                { transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'ease-out'
            });

            animation.onfinish = () => {
                spark.remove();
            };
        }

        // Show moon
        function showMoon() {
            gameState.moonVisible = true;
            const moon = document.getElementById('moon');
            moon.style.opacity = '1';
        }

        // Start audio system
        function startAudio() {
            gameState.audioStarted = true;
            // Audio implementation would go here
            // For now, we'll just log that it started
            console.log('Audio started');
        }

        // Update lantern positions
        function updateLanterns() {
            const container = document.getElementById('lanternContainer');
            const now = Date.now();

            gameState.lanterns.forEach((lantern, index) => {
                if (lantern.element) {
                    // Apply physics
                    lantern.x += lantern.vx;
                    lantern.y += lantern.vy;

                    // Apply wind effect based on depth
                    lantern.vx += (Math.random() - 0.5) * 0.05 * lantern.depth;

                    // Apply buoyancy
                    lantern.vy *= 0.99;
                    lantern.vx *= 0.99;

                    // Update position
                    lantern.element.style.left = `${lantern.x}px`;
                    lantern.element.style.top = `${lantern.y}px`;

                    // Apply parallax effect
                    if (gameState.mouseX && gameState.mouseY) {
                        const parallaxX = (gameState.mouseX - window.innerWidth / 2) * 0.0005 * lantern.depth;
                        const parallaxY = (gameState.mouseY - window.innerHeight / 2) * 0.0005 * lantern.depth;
                        lantern.element.style.transform = `scale(${lantern.scale}) translate(${parallaxX}px, ${parallaxY}px)`;
                    }

                    // Remove lanterns that are off screen
                    if (lantern.y < -100) {
                        lantern.element.remove();
                        gameState.lanterns.splice(index, 1);
                    }
                }
            });

            requestAnimationFrame(updateLanterns);
        }

        // Handle touch/mouse events
        function handleInteraction(e) {
            e.preventDefault();
            let x, y;

            if (e.type === 'touchstart') {
                const touch = e.touches[0];
                x = touch.clientX;
                y = touch.clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            createLantern(x, y);

            // Hide instructions after first tap
            if (gameState.lanternCount === 1) {
                document.getElementById('instructions').classList.add('fade-out');
            }
        }

        // Mouse move for parallax effect
        function handleMouseMove(e) {
            gameState.mouseX = e.clientX;
            gameState.mouseY = e.clientY;
        }

        // Initialize the game
        function init() {
            initStars();
            updateLanterns();

            // Set up event listeners
            document.addEventListener('touchstart', handleInteraction);
            document.addEventListener('mousedown', handleInteraction);
            document.addEventListener('mousemove', handleMouseMove);

            // Auto-hide instructions after 3 seconds
            setTimeout(() => {
                const instructions = document.getElementById('instructions');
                if (instructions && !instructions.classList.contains('fade-out')) {
                    instructions.classList.add('fade-out');
                }
            }, 3000);

            // Set window game state for testing
            window.gameState = gameState;
        }

        // Start the game when page loads
        window.addEventListener('load', init);
