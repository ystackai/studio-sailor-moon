<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trapdoor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #050508; }
canvas { display: block; position: absolute; top: 0; left: 0; }
#hint {
  position: fixed; bottom: 14px; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,0.3);
  font: 13px/1 'Courier New', monospace; letter-spacing: 0.12em;
  pointer-events: none; transition: opacity 0.6s;
}
#hint.hidden { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">drag downward to open the trapdoor</div>
<script>
(() => {

    // ════════════════════════════════════════════
    // SYNC CONTRACT (single render pass)
    // Physics → trigger → audio mute → visual fade all execute
    // within one rAF callback. Frame counter is the single clock.
    // Visual fade uses cubic ease-out over 10 frames to match
    // the acoustic decay envelope of the muted drone (~170ms).
    // ════════════════════════════════════════════

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    generateCrumbTexture();
    generateStars();
    renderStarBackground();
  }
  window.addEventListener('resize', resize);

    // ════════════════════════════════════════════
    // DRAG PHYSICS — molasses-like exponential drag
    //
    // Molasses coefficient: mu = mu0 + (muMax - mu0) * (d/D)^2
    // where d = displacement from center, D = threshold.
    // At center: near-zero resistance. At threshold: ~20x drag.
    // Creates "tension curve" — easy to start pulling, increasingly
    // sticky as you approach the point of no return.
    // ════════════════════════════════════════════
  const THRESHOLD     = 120;      // px drag distance to trigger trap
  const BASE_DRAG     = 0.85;     // baseline friction (always applied)
  const MAX_DRAG      = 0.97;     // max friction near threshold (~20x effective drag)

    // Spring params
  const SPRING_K      = 0.06;
  const DAMPING       = 0.90;

  let drag = {
    active: false,
    originX: 0, originY: 0,
    cx: 0, cy: 0,
    vx: 0, vy: 0,
    displacement: 0
  };

  let centerX = W / 2;
  let centerY = H / 2;

    // ════════════════════════════════════════════
    // TRAP STATE — single source of truth
    // ════════════════════════════════════════════
  const trapState = {
    triggered: false,
    decayRate: 0.04,
  };

  let frame        = 0;
  let triggerFrame = 0;          // rAF frame index when trap fired
  const FADE_FRAMES = 10;        // visual fade duration in frames (~167ms @ 60fps)

    // ════════════════════════════════════════════
    // PERFORMANCE — Pixel 5 target
    // ════════════════════════════════════════════
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  const CRUMB_COUNT = isMobile ? 32 : 64;

    // ════════════════════════════════════════════
    // STAR FIELD — pre-rendered background tile
    // ════════════════════════════════════════════
  let stars = [];
  let starBgCanvas, starBgCtx;

  function generateStars() {
    stars = [];
    const count = Math.floor((W * H) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 0.5 + Math.random() * 1.2,
        a: 0.3 + Math.random() * 0.5,
        twinkleSpeed: 0.005 + Math.random() * 0.015,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function renderStarBackground() {
    starBgCanvas = document.createElement('canvas');
    starBgCanvas.width = W;
    starBgCanvas.height = H;
    starBgCtx = starBgCanvas.getContext('2d');
    for (const s of stars) {
      const twinkle = 0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.phase);
      starBgCtx.fillStyle = `rgba(255,255,255,${s.a * twinkle})`;
      starBgCtx.beginPath();
      starBgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      starBgCtx.fill();
    }
  }

    // ════════════════════════════════════════════
    // CRUMB TEXTURE — procedural pre-render
    // ════════════════════════════════════════════
  let crumbCanvas, crumbCtx;

  function generateCrumbTexture() {
    crumbCanvas = document.createElement('canvas');
    crumbCanvas.width = W * 0.5;
    crumbCanvas.height = H * 0.5;
    crumbCtx = crumbCanvas.getContext('2d');
    for (let i = 0; i < CRUMB_COUNT; i++) {
      const x = Math.random() * crumbCanvas.width;
      const y = Math.random() * crumbCanvas.height;
      const r = 1 + Math.random() * 3;
      const alpha = 0.05 + Math.random() * 0.15;
      crumbCtx.fillStyle = `rgba(255,255,240,${alpha})`;
      crumbCtx.beginPath();
      crumbCtx.arc(x, y, r, 0, Math.PI * 2);
      crumbCtx.fill();
    }
    for (let i = 0; i < CRUMB_COUNT / 3; i++) {
      const x = Math.random() * crumbCanvas.width;
      const y = Math.random() * crumbCanvas.height;
      const r = 4 + Math.random() * 8;
      const alpha = 0.02 + Math.random() * 0.06;
      crumbCtx.fillStyle = `rgba(200,180,150,${alpha})`;
      crumbCtx.beginPath();
      for (let j = 0; j < 5; j++) {
        const angle = (j / 5) * Math.PI * 2 + Math.random() * 0.3;
        const pr = r * (0.6 + Math.random() * 0.4);
        if (j === 0) crumbCtx.moveTo(x + Math.cos(angle) * pr, y + Math.sin(angle) * pr);
        else crumbCtx.lineTo(x + Math.cos(angle) * pr, y + Math.sin(angle) * pr);
      }
      crumbCtx.closePath();
      crumbCtx.fill();
    }
  }

    // ════════════════════════════════════════════
    // FLOATING ORB
    // ════════════════════════════════════════════
  let orb = {
    x: 0, y: 0,
    r: 36,
    glowPhase: 0,
    triggeredGlow: 0,
    shakeX: 0, shakeY: 0
  };

    // ════════════════════════════════════════════
    // CRUMB PARTICLES
    // ════════════════════════════════════════════
  let crumbs = [];

  function spawnCrumbTrapParticles() {
    const count = isMobile
        ? Math.min(60, Math.floor((W * H) / 12000))
        : Math.min(120, Math.floor((W * H) / 6000));
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 3;
      crumbs.push({
        x: orb.x, y: orb.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        r: 1 + Math.random() * 3,
        alpha: 0.6 + Math.random() * 0.4,
        decay: 0.003 + Math.random() * 0.008,
        gravity: 0.02 + Math.random() * 0.04,
      });
    }
  }

    // ════════════════════════════════════════════
    // AUDIO — Web Audio API
    // All audio scheduling happens inside triggerTrap(),
    // which runs in the same rAF as physics & visuals.
    // ════════════════════════════════════════════
  let audioCtx, masterGain;
  let droneOsc1, droneGain1, droneOsc2, droneGain2;
  let audioReady = false;

  function initAudio() {
    if (audioReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
      audioReady = true;
      startDrone();
    } catch (e) { /* audio unavailable, trap still works */ }
  }

  function startDrone() {
    if (!audioCtx) return;
    droneOsc1 = audioCtx.createOscillator();
    droneGain1 = audioCtx.createGain();
    droneOsc1.type = 'sine';
    droneOsc1.frequency.value = 55;
    droneGain1.gain.value = 0;
    droneGain1.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);
    droneOsc1.connect(droneGain1);
    droneGain1.connect(masterGain);
    droneOsc1.start();

    droneOsc2 = audioCtx.createOscillator();
    droneGain2 = audioCtx.createGain();
    droneOsc2.type = 'sine';
    droneOsc2.frequency.value = 82.5;
    droneGain2.gain.value = 0;
    droneGain2.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 2);
    droneOsc2.connect(droneGain2);
    droneGain2.connect(masterGain);
    droneOsc2.start();
  }

    // ═── MUTE DRONE — fires SAME FRAME as physics freeze ──
    // Exponential ramp to silence matching visual fade duration.
  function muteDrone() {
    if (!audioCtx || !droneGain1) return;
    const t = audioCtx.currentTime;
    const dur = 0.17;    // ~10 frames @ 60fps, matches FADE_FRAMES

    droneGain1.gain.cancelScheduledValues(t);
    droneGain1.gain.setValueAtTime(droneGain1.gain.value, t);
    droneGain1.gain.exponentialRampToValueAtTime(0.0001, t + dur);

    droneGain2.gain.cancelScheduledValues(t);
    droneGain2.gain.setValueAtTime(droneGain2.gain.value, t);
    droneGain2.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  }

    // IMPACT CRACK — fires at the exact moment of blackout
    // Layered: high-frequency crack transient + sub-bass thump
  function playImpactCrack() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;

      // Crack transient — short, sharp noise burst simulating a door snapping open
    const crackBufSize = Math.floor(audioCtx.sampleRate * 0.08);
    const crackBuf = audioCtx.createBuffer(1, crackBufSize, audioCtx.sampleRate);
    const cd = crackBuf.getChannelData(0);
    for (let i = 0; i < crackBufSize; i++) {
      const p = i / crackBufSize;
       // Hard attack (fast rise), fast decay with slight mid-ring
      cd[i] = (Math.random() * 2 - 1) * Math.exp(-p * 30) * (1 + 0.4 * Math.sin(p * 50));
    }
    const crackSrc = audioCtx.createBufferSource();
    crackSrc.buffer = crackBuf;
     // High-pass to emphasize the crack character
    const crackHP = audioCtx.createBiquadFilter();
    crackHP.type = 'highpass';
    crackHP.frequency.value = 800;
    crackHP.Q.value = 0.7;
    const crackGain = audioCtx.createGain();
    crackGain.gain.setValueAtTime(0.9, t);
    crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    crackSrc.connect(crackHP);
    crackHP.connect(crackGain);
    crackGain.connect(masterGain);
    crackSrc.start(t);

      // Sub-bass thump — body of the impact
    const thump = audioCtx.createOscillator();
    const thumpGain = audioCtx.createGain();
    thump.type = 'sine';
    thump.frequency.setValueAtTime(80, t);
    thump.frequency.exponentialRampToValueAtTime(25, t + 0.6);
    thumpGain.gain.setValueAtTime(0.5, t);
    thumpGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    thump.connect(thumpGain);
    thumpGain.connect(masterGain);
    thump.start(t);
    thump.stop(t + 0.8);
  }

    // SAD SIGH — plays once on release when trap is NOT triggered
    // Breath-like noise burst: slow attack, smooth long decay
  function playSadSigh() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
     // Noise shaped like an exhale (slow attack → long decay)
    const sighBufSize = Math.floor(audioCtx.sampleRate * 0.6);
    const sighBuf = audioCtx.createBuffer(1, sighBufSize, audioCtx.sampleRate);
    const sd = sighBuf.getChannelData(0);
    for (let i = 0; i < sighBufSize; i++) {
      const p = i / sighBufSize;
       // Slow attack (~120ms), long decay (~480ms)
      sd[i] = (Math.random() * 2 - 1) * Math.pow(p, 3) * (1 - p);
    }
    const sighSrc = audioCtx.createBufferSource();
    sighSrc.buffer = sighBuf;
     // Bandpass filter for breathy character
    const sighBP = audioCtx.createBiquadFilter();
    sighBP.type = 'bandpass';
    sighBP.frequency.value = 600;
    sighBP.Q.value = 1.5;
    const sighGain = audioCtx.createGain();
    sighGain.gain.setValueAtTime(0, t);
    sighGain.gain.linearRampToValueAtTime(0.12, t + 0.12);
    sighGain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    sighSrc.connect(sighBP);
    sighBP.connect(sighGain);
    sighGain.connect(masterGain);
    sighSrc.start(t);
  }

    // ════════════════════════════════════════════
    // TRIGGER — atomic three-way state update
    // Physics freeze, audio mute+impact, crumb spawn —
    // all execute in one rAF frame. No intermediate renders.
    // ════════════════════════════════════════════
  function triggerTrap() {
    if (trapState.triggered) return;
    trapState.triggered = true;

      // Frame counter snapshot — visual fade starts from frame 0 here
    triggerFrame = frame;

      // Physics freeze — lock orb, apply initial shake
    drag.vx = 0;
    drag.vy = 0;
    orb.shakeX = 4;
    orb.shakeY = 4;

      // Spawn crumb particles (handled in physics loop, spawned here)
    spawnCrumbTrapParticles();

      // Audio: mute ambient drone + play impact crack — same frame as physics freeze
    muteDrone();
    playImpactCrack();

    hint.textContent = 'the trapdoor has opened';
    hint.style.color = 'rgba(255,180,100,0.6)';
  }

    // ════════════════════════════════════════════
    // INPUT HANDLING — pointer events
    // ════════════════════════════════════════════
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    initAudio();
    drag.active = true;
    drag.originX = centerX + (e.clientX - centerX);
    drag.originY = centerY + (e.clientY - centerY);
    drag.cx = e.clientX;
    drag.cy = e.clientY;
    drag.vx = 0;
    drag.vy = 0;
    orb.x = centerX;
    orb.y = centerY;
    hint.classList.add('hidden');
  }, { passive: false });

  canvas.addEventListener('pointermove', (e) => {
    if (!drag.active) return;
    const newCx = e.clientX;
    const newCy = e.clientY;
    drag.vx += (newCx - drag.cx);
    drag.vy += (newCy - drag.cy);
    drag.cx = newCx;
    drag.cy = newCy;
  }, { passive: false });

  canvas.addEventListener('pointerup', (e) => {
    if (!drag.active) return;
    drag.active = false;
     // If trap was NOT triggered on release → play sad sigh
    if (!trapState.triggered) {
      playSadSigh();
      hint.textContent = '...the door stays shut';
      hint.classList.remove('hidden');
    }
  }, { passive: false });

    // ════════════════════════════════════════════
    // PHYSICS UPDATE — molasses drag per frame
    //
    // Drag coefficient mu(d) varies from BASE_DRAG at center to
    // MAX_DRAG at threshold. Quadratic interpolation:
    //   t = d/D    (0→1 normalized distance)
    //   mu = BASE_DRAG + (MAX_DRAG - BASE_DRAG) * t^2
    //
    // Effect: pulling back feels almost normal near center,
    // but becomes increasingly "stuck" like pulling through
    // molasses. At ~70% of threshold the drag is ~3x stronger;
    // at threshold it's ~20x stronger — the "point of no return".
    // ════════════════════════════════════════════

    // Molasses drag: quadratic interpolation of friction coefficient
  function molassesDrag(t) {
    const t2 = t * t;                               // quadratic interp factor
    return BASE_DRAG + (MAX_DRAG - BASE_DRAG) * t2;   // mu at this displacement
  }

  function updatePhysics() {
    if (trapState.triggered) {
        // Post-trigger: decaying shake + crumbling particles
      orb.shakeX *= 0.92;
      orb.shakeY *= 0.92;

      for (let i = crumbs.length - 1; i >= 0; i--) {
        const c = crumbs[i];
        c.x += c.vx;
        c.y += c.vy;
        c.vy += c.gravity;
        c.vx *= 0.99;
        c.alpha -= c.decay;
        if (c.alpha <= 0) crumbs.splice(i, 1);
      }
      return;
    }

      // Spring pull-back toward center
    const dx = centerX - orb.x;
    const dy = centerY - orb.y;

    drag.vx *= BASE_DRAG;         // baseline friction always applied
    drag.vy *= BASE_DRAG;

    orb.x += drag.vx * 0.5;
    orb.y += drag.vy * 0.5;
    orb.x += dx * SPRING_K;
    orb.y += dy * DAMPING * 0.3;

      // Compute displacement from center (how far user dragged)
    const ddx = centerX - orb.x;
    const ddy = centerY - orb.y;
    drag.displacement = Math.sqrt(ddx * ddx + ddy * ddy);

      // Clamp so orb doesn't fly off screen
    const maxDisp = Math.min(W, H) * 0.4;
    if (drag.displacement > maxDisp) {
      const scale = maxDisp / drag.displacement;
      orb.x = centerX + (orb.x - centerX) * scale;
      orb.y = centerY + (orb.y - centerY) * scale;
      drag.displacement = maxDisp;
    }

      // ── Molasses drag: applies quadratic drag based on displacement ──
      // This is the key viscous-feeling physics — resistance builds up
      // non-linearly as you move away from center, creating tension.
    const t = Math.min(1, drag.displacement / THRESHOLD);    // normalized [0,1]
    const mu = molassesDrag(t);                               // variable friction
    drag.vx *= mu;                                            // extra viscous damping
    drag.vy *= mu;

      // Check threshold — trigger if displacement exceeds limit
    if (drag.displacement >= THRESHOLD) {
      triggerTrap();
    }
  }

    // ════════════════════════════════════════════
    // RENDER — single rAF loop: physics → draw
    // ── SYNC CONTRACT ──
    // Frame counter is the single clock. Visual fade starts at
    // triggerFrame (same frame as trap triggers). Cubic ease-out
    // over FADE_FRAMES matches audio drone mute ramp duration.
    // ════════════════════════════════════════════

    // Cubic ease-out: f(0)=0, f(1)=1 — creates smooth "crash" feel
  function cubicEaseOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function render() {
    frame++;

      // ── Physics first (all state updates, single call) ──
    updatePhysics();

      // Clear
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);

      // Stars — pre-rendered background tile on mobile for perf
    if (isMobile && starBgCanvas) {
      ctx.drawImage(starBgCanvas, 0, 0);
    } else {
      for (const s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.phase);
        ctx.fillStyle = `rgba(255,255,255,${s.a * twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

      // Apply shake to orb position (only when triggered)
    let drawX = orb.x;
    let drawY = orb.y;
    if (trapState.triggered && orb.shakeX > 0.1) {
      drawX += (Math.random() - 0.5) * orb.shakeX;
      drawY += (Math.random() - 0.5) * orb.shakeY;
    }

      // Draw trap threshold indicator ring (approach warning)
    if (!trapState.triggered && drag.displacement > THRESHOLD * 0.3) {
      const ringProgress = drag.displacement / THRESHOLD;
      const ringAlpha = (ringProgress - 0.3) / 0.7;
      ctx.strokeStyle = `rgba(255,140,80,${ringAlpha * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(centerX, centerY, THRESHOLD, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ringProgress);
      ctx.stroke();

      ctx.strokeStyle = `rgba(255,140,80,${ringAlpha * 0.08})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(centerX, centerY, THRESHOLD, 0, Math.PI * 2);
      ctx.stroke();
    }

      // Draw orb glow layers (outer to inner)
    const triggerGlow = trapState.triggered ? 0.4 : 0;
    for (let layer = 3; layer >= 0; layer--) {
      const radius = orb.r + layer * 12 + triggerGlow * layer * 20;
      const alpha = (0.02 + triggerGlow) * (1 - layer * 0.2);
      const hue = trapState.triggered ? `hsl(${30 + frame * 0.5}, 80%, ${50 + triggerGlow * 20}%)` : '180';
      ctx.fillStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(drawX, drawY, radius, 0, Math.PI * 2);
      ctx.fill();
    }

      // Draw orb core
    if (trapState.triggered) {
      const warmth = Math.min(1, frame * 0.005);
      const r = 255;
      const g = Math.floor(200 - warmth * 100);
      const b = Math.floor(150 - warmth * 130);
      ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    } else {
      ctx.fillStyle = 'rgba(150,220,255,0.8)';
    }
    ctx.beginPath();
    ctx.arc(drawX, drawY, orb.r, 0, Math.PI * 2);
    ctx.fill();

      // Draw crumb particles
    for (const c of crumbs) {
      ctx.fillStyle = `rgba(255,235,180,${c.alpha})`;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
    }

      // Crumb texture overlay — fades with trap frame count
      // Fades out as blackout approaches so particles are visible during transition
    if (trapState.triggered && crumbs.length > 0) {
      const elapsed = Math.min(frame - triggerFrame, FADE_FRAMES);
      const texFadeIn = cubicEaseOut(elapsed / FADE_FRAMES);
      const texFadeOut = 1 - cubicEaseOut(elapsed / FADE_FRAMES);
      const baseAlpha = Math.min(0.15, trapState.decayRate * crumbs.length * 0.002);
      ctx.globalAlpha = baseAlpha * texFadeIn;
      ctx.drawImage(crumbCanvas, 0, 0, W, H);
      ctx.globalAlpha = 1;
    }

      // Connection line (shows drag displacement before trigger)
    if (!trapState.triggered && drag.active) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(drawX, drawY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

      // Vignette intensifies as drag approaches threshold
    if (!trapState.triggered) {
      const vigAlpha = 0.3 + (drag.displacement / THRESHOLD) * 0.2;
      const vigGrad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.7);
      vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
      vigGrad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, W, H);
    }

      // ── Trap visual fade to pure BLACKOUT ──
      // SYNC: triggers same frame as physics freeze + audio impact crack.
      // Cubic ease-out over FADE_FRAMES matches drone mute envelope.
      // Texture overlay fades IN then OUT (peak at 50%, gone by blackout).
    if (trapState.triggered) {
      const elapsed = Math.min(frame - triggerFrame, FADE_FRAMES);
      const intensity = cubicEaseOut(elapsed / FADE_FRAMES);
       // Pure black overlay — goes from transparent → full black over 10 frames
      ctx.fillStyle = `rgba(0,0,0,${intensity})`;
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(render);
  }

    // ════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════
  resize();
  orb.x = centerX;
  orb.y = centerY;
  render();

})();
</script>
</body>
</html>
